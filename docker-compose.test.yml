# Окружение для тестов package-core (локально/CI). К проектам-форкам и к release.yml
# отношения не имеет. Запуск: make test (см. Makefile).

services:
  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    working_dir: /app
    volumes:
      - ./backend:/app:cached
      - backend_vendor:/app/vendor
    command: >
      sh -c "
        composer install --no-interaction --prefer-dist --no-progress &&
        vendor/bin/phpunit
      "

  test-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "
        npm install --no-fund --no-audit &&
        npm run typecheck &&
        npm test
      "

volumes:
  backend_vendor:
  frontend_node_modules:
