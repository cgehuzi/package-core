name: Release

# Релиз создаётся вручную на GitHub. На событие "release: published" workflow
# собирает два архива (backend .tar.gz, frontend .tgz) и прикладывает их к релизу.
# composer ставит из .tar.gz (type:package у проекта), npm — из .tgz.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  assets:
    name: Build and attach tarballs
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync frontend package.json version with tag
        working-directory: frontend
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Build backend tarball
        run: |
          # Пакуем содержимое backend/ БЕЗ ведущего './': PharData в composer падает
          # на entry с именем '.' ("Cannot extract '.'"). Перечисляем верхнеуровневые
          # entries (включая скрытые), исключая dev-артефакты.
          (
            cd backend
            shopt -s nullglob dotglob
            filtered=()
            for e in *; do
              case "$e" in
                vendor|tests|.phpunit.cache|.phpunit.result.cache|node_modules|Dockerfile.test|phpunit.xml) ;;
                *) filtered+=( "$e" );;
              esac
            done
            tar -czf "../core-backend-${TAG}.tar.gz" "${filtered[@]}"
          )
          echo "--- contents ---"
          tar -tzf "core-backend-${TAG}.tar.gz"

      - name: Build frontend tarball (npm pack)
        run: |
          cd frontend
          PACKED=$(npm pack --pack-destination .. --json | sed -n 's/.*"filename": "\(.*\)".*/\1/p' | head -n1)
          cd ..
          mv "$PACKED" "core-frontend-${TAG}.tgz"
          ls -lh "core-frontend-${TAG}.tgz"

      - name: Attach assets to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            core-backend-${{ github.event.release.tag_name }}.tar.gz
            core-frontend-${{ github.event.release.tag_name }}.tgz
          fail_on_unmatched_files: true
